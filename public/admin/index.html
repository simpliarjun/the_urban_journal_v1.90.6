<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Urban Journal - Admin Panel</title>
    <style>
        :root {
            --bg-color: #f7f7f7;
            --card-bg: #ffffff;
            --text-color: #222222;
            --text-muted: #666666;
            --primary: #111111;
            --primary-hover: #333333;
            --accent: #0073aa;
            --border-color: #eaeaea;
            --success: #2e7d32;
            --error: #c62828;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 26px;
            margin: 0;
            font-weight: bold;
        }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        
        .card h2 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
            background: #fff;
        }
        
        .form-group textarea {
            resize: vertical;
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }
        
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-success {
            background-color: var(--success);
        }
        .btn-success:hover {
            background-color: #1b5e20;
        }
        
        .btn-danger {
            background-color: var(--error);
        }
        .btn-danger:hover {
            background-color: #b71c1c;
        }
        
        .comment-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .comment-item {
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            background-color: #fafafa;
        }
        
        .comment-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .comment-author {
            font-weight: bold;
        }
        
        .comment-post {
            font-style: italic;
            color: var(--text-muted);
        }
        
        .comment-content {
            margin-top: 10px;
            font-size: 15px;
            color: #333;
            white-space: pre-line;
        }
        
        .comment-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .comment-actions .btn {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-style: italic;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 600;
            font-size: 15px;
        }
        
        .tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }

        .notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            color: #856404;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <h1>The Urban Journal &mdash; Administration</h1>
        <div style="font-size: 14px; color: var(--text-muted);">Cloud Admin Panel</div>
    </header>
    
    <div class="container">
        <!-- Add Blog Post Section -->
        <div class="card">
            <h2>Write a New Blog Post</h2>
            <form id="create-post-form" onsubmit="return handleCreatePost(event)">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" required placeholder="Enter blog title...">
                </div>
                
                <div class="form-group">
                    <label>Categories *</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="category_3" checked> Politics
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="category_4"> Psychology
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="category_5"> Personal Truth
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" name="tags" placeholder="e.g. Media, Democracy, Society">
                </div>
                
                <div class="form-group">
                    <label>Featured Image</label>
                    <input type="file" name="image" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label>Content (HTML/Text) *</label>
                    <textarea name="content" required rows="14" placeholder="Write your blog post content here..."></textarea>
                </div>
                
                <div style="text-align: right;">
                    <button type="submit" class="btn">Publish Post</button>
                </div>
            </form>
        </div>
        
        <!-- Comment Moderation Section -->
        <div class="card">
            <h2>Moderate Comments</h2>
            
            <div class="tabs">
                <div id="tab-pending" class="tab active" onclick="switchTab('pending')">Pending Approval</div>
                <div id="tab-approved" class="tab" onclick="switchTab('approved')">Approved</div>
            </div>
            
            <div id="pending-container">
                <ul id="pending-list" class="comment-list">
                    <li class="loading">Loading comments...</li>
                </ul>
            </div>
            
            <div id="approved-container" style="display: none;">
                <ul id="approved-list" class="comment-list">
                    <li class="loading">Loading comments...</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        let commentData = { pending: [], approved: [] };
        
        function fetchComments() {
            fetch('/api/admin')
                .then(res => {
                    if (res.status === 401) {
                        // Browser will handle the auth prompt automatically
                        throw new Error('Authentication required');
                    }
                    return res.json();
                })
                .then(data => {
                    commentData = data;
                    renderComments();
                })
                .catch(err => {
                    console.error("Error fetching data:", err);
                    document.getElementById('pending-list').innerHTML = '<li class="empty-state">Failed to load comments. Please refresh and try again.</li>';
                });
        }
        
        function renderComments() {
            const pendingList = document.getElementById('pending-list');
            const approvedList = document.getElementById('approved-list');
            
            // Render Pending
            if (commentData.pending.length === 0) {
                pendingList.innerHTML = '<li class="empty-state">No comments pending moderation.</li>';
            } else {
                pendingList.innerHTML = commentData.pending.map(c => `
                    <li class="comment-item">
                        <div class="comment-meta">
                            <span class="comment-author">${c.author} (${c.email})</span>
                            <span class="comment-post">on Post ID: ${c.post_id}</span>
                        </div>
                        <div class="comment-content">${c.comment}</div>
                        <div class="comment-actions">
                            <button class="btn btn-success" onclick="approveComment('${c.filename}')">Approve</button>
                            <button class="btn btn-danger" onclick="rejectComment('${c.filename}', null)">Reject</button>
                        </div>
                    </li>
                `).join('');
            }
            
            // Render Approved
            if (commentData.approved.length === 0) {
                approvedList.innerHTML = '<li class="empty-state">No approved comments.</li>';
            } else {
                approvedList.innerHTML = commentData.approved.map(c => `
                    <li class="comment-item">
                        <div class="comment-meta">
                            <span class="comment-author">${c.author} (${c.email})</span>
                            <span class="comment-post">on "${c.post_title}"</span>
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">Published: ${c.date}</div>
                        <div class="comment-content">${c.comment}</div>
                        <div class="comment-actions">
                            <button class="btn btn-danger" onclick="rejectComment(null, ${c.id})">Delete</button>
                        </div>
                    </li>
                `).join('');
            }
        }
        
        function switchTab(type) {
            document.getElementById('tab-pending').classList.toggle('active', type === 'pending');
            document.getElementById('tab-approved').classList.toggle('active', type === 'approved');
            
            document.getElementById('pending-container').style.display = type === 'pending' ? 'block' : 'none';
            document.getElementById('approved-container').style.display = type === 'approved' ? 'block' : 'none';
        }
        
        function approveComment(filename) {
            if (!confirm("Are you sure you want to approve this comment?")) return;
            
            fetch('/api/admin_approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert("Comment approved successfully!");
                    fetchComments();
                } else {
                    alert("Error: " + res.message);
                }
            });
        }
        
        function rejectComment(filename, id) {
            const msg = filename ? "Are you sure you want to reject this pending comment?" : "Are you sure you want to delete this approved comment?";
            if (!confirm(msg)) return;
            
            fetch('/api/admin_reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename, id })
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert("Comment deleted successfully!");
                    fetchComments();
                } else {
                    alert("Error: " + res.message);
                }
            });
        }

        function handleCreatePost(event) {
            event.preventDefault();

            const form = event.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.textContent;

            const title = form.querySelector('[name="title"]').value.trim();
            const content = form.querySelector('[name="content"]').value.trim();
            const tagsRaw = form.querySelector('[name="tags"]').value.trim();
            const imageInput = form.querySelector('[name="image"]');

            const categoryMap = {
                category_3: 'Politics',
                category_4: 'Psychology',
                category_5: 'Personal Truth'
            };
            const categories = Object.keys(categoryMap)
                .filter(key => form.querySelector(`[name="${key}"]`).checked)
                .map(key => {
                    const name = categoryMap[key];
                    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
                    return { name, slug };
                });

            const tags = tagsRaw
                ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean).map(name => {
                    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
                    return { name, slug };
                })
                : [];

            if (!title || !content) {
                alert("Title and content are required.");
                return false;
            }

            function submitPost(imageBase64, imageFilename) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Publishing...';

                fetch('/api/admin_create_post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        content,
                        categories,
                        tags,
                        image_base64: imageBase64,
                        image_filename: imageFilename
                    })
                })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert("Post published successfully! It will appear on the site after the next site rebuild (usually within a minute).");
                        form.reset();
                    } else {
                        alert("Error: " + res.message);
                    }
                })
                .catch(err => {
                    alert("Error publishing post: " + err.message);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                });
            }

            if (imageInput.files && imageInput.files[0]) {
                const file = imageInput.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    const base64Data = reader.result.split(',')[1];
                    submitPost(base64Data, file.name);
                };
                reader.onerror = () => {
                    alert("Failed to read the selected image file.");
                };
                reader.readAsDataURL(file);
            } else {
                submitPost(null, null);
            }

            return false;
        }
        
        // Initial Fetch
        fetchComments();
    </script>
</body>
</html>
